name: Terraform CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

defaults:
  run:
    working-directory: infra

jobs:
  terraform:
    name: Terraform fmt / init / validate / plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        run: |
          set -o pipefail
          terraform plan -var-file=envs/dev/dev.tfvars -no-color -input=false 2>&1 | tee plan.txt

      - name: Post plan as PR comment
        if: always() && steps.plan.outcome != 'skipped'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const planPath = path.join(process.env.GITHUB_WORKSPACE, 'infra', 'plan.txt');
            let plan = fs.readFileSync(planPath, 'utf8');
            const MAX = 60000;
            if (plan.length > MAX) {
              plan = plan.slice(0, MAX) + '\n\n... (output truncated)';
            }
            const status = '${{ steps.plan.outcome }}';
            const body = [
              `### Terraform Plan — \`${status}\``,
              '',
              '<details><summary>Show plan output</summary>',
              '',
              '```hcl',
              plan,
              '```',
              '',
              '</details>',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
