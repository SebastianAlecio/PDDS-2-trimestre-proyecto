name: Terraform CI

# PR validation workflow. Corre fmt / validate / plan como tres JOBS
# SEPARADOS para que cada uno reporte un status check independiente a
# GitHub. Eso es necesario porque el branch protection ruleset
# (Settings → Rules) referencia los checks por nombre exacto del job:
#   - "Terraform fmt"
#   - "Terraform validate"
#   - "Terraform plan (dev)"
#
# Si renombramos algún job, hay que actualizar el ruleset en GitHub o
# el merge gate queda silenciosamente roto (rubric OYD-D4 pitfall named:
# "Required check name mismatch").

on:
  pull_request:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/**"

permissions:
  contents: read
  pull-requests: write
  # OIDC token exchange — D5 Deliverable C. Sin este permission el step de
  # configure-aws-credentials no puede pedir un token JWT a GitHub OIDC y
  # falla con "Could not assume role with OIDC".
  id-token: write

defaults:
  run:
    working-directory: infra

jobs:
  # ─── fmt ────────────────────────────────────────────────────────────────
  # Solo necesita el código TF, no la dependencia de provider plugins ni
  # acceso al state. Rápido (~5s).
  terraform-fmt:
    name: Terraform fmt
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"
          terraform_wrapper: false

      - name: Terraform fmt
        run: terraform fmt -check -recursive

  # ─── validate ───────────────────────────────────────────────────────────
  # Necesita providers (terraform init) pero NO el remote state — usamos
  # init sin -backend-config para que la validación sea offline-friendly.
  # Si init contra el backend real fallara por permisos, validate aún corre.
  terraform-validate:
    name: Terraform validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"
          terraform_wrapper: false

      - name: Terraform init (no backend)
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        run: terraform validate

  # ─── plan ──────────────────────────────────────────────────────────────
  # Necesita providers + backend (lee state) + AWS creds (porque algunos
  # data sources hacen API calls — ej. aws_region, aws_caller_identity).
  # Genera el tfplan y lo sube como artifact para que el apply-on-merge
  # use el plan EXACTO en vez de re-planear contra state potencialmente
  # cambiado (rubric pitfall named: "Apply re-plans on merge").
  terraform-plan:
    name: Terraform plan (dev)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Node.js es requerido por null_resource.npm_install (módulo compute)
      # que corre `npm install --omit=dev` para empaquetar deps que el
      # runtime de Node 22 Lambda no trae.
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"
          terraform_wrapper: false

      # OIDC federation — D5 Deliverable C. role-to-assume es el ci_runner
      # ARN provisionado por module.iam (terraform output iam_ci_runner_role_arn).
      # Trust policy acepta sub claims pull_request, environment:dev,
      # environment:staging y ref:refs/heads/main — todas scopeadas al repo.
      # AWS_ROLE_ARN_DEV se setea como GH var en Settings → Variables.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN_DEV }}
          aws-region: us-east-1

      - name: Terraform init (backend-dev.hcl)
        run: terraform init -backend-config=envs/dev/backend-dev.hcl -input=false

      - name: Terraform plan
        id: plan
        run: |
          set -o pipefail
          terraform plan \
            -var-file=envs/dev/dev.tfvars \
            -out=tfplan \
            -no-color \
            -input=false 2>&1 | tee plan.txt

      # Upload del plan artifact — descargado por terraform-apply.yml en
      # el job apply-dev. El nombre "tfplan" es referenciado por el otro
      # workflow; si cambia acá, cambia allá.
      #
      # IMPORTANTE: incluimos modules/compute/build/*.zip además del tfplan
      # binary. El data.archive_file de Terraform materializa los zips de
      # las Lambdas durante el plan; el binary del plan guarda solo el
      # HASH de los zips, no su contenido. Si el apply intenta crear/update
      # un aws_lambda_function sin tener el zip en disk, falla con
      # "open ...zip: no such file or directory". Subir el build/ dir
      # junto con el tfplan es la forma standard de resolver esto.
      - name: Upload tfplan + Lambda zips artifact
        uses: actions/upload-artifact@v5
        with:
          name: tfplan
          path: |
            infra/tfplan
            infra/modules/compute/build/
          if-no-files-found: error
          retention-days: 7

      - name: Post plan as PR comment
        if: always() && steps.plan.outcome != 'skipped'
        continue-on-error: true
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const planPath = path.join(process.env.GITHUB_WORKSPACE, 'infra', 'plan.txt');
            let plan = fs.readFileSync(planPath, 'utf8');
            const MAX = 60000;
            if (plan.length > MAX) {
              plan = plan.slice(0, MAX) + '\n\n... (output truncated)';
            }
            const status = '${{ steps.plan.outcome }}';
            const body = [
              `### Terraform Plan (dev) — \`${status}\``,
              '',
              'Plan saved as `tfplan` artifact. The apply-on-merge workflow downloads',
              'this exact artifact and runs `terraform apply tfplan` — no re-plan.',
              '',
              '<details><summary>Show plan output</summary>',
              '',
              '```hcl',
              plan,
              '```',
              '',
              '</details>',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
