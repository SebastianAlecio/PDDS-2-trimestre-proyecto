name: Terraform Destroy (gated)

# Gated destroy — único trigger es workflow_dispatch. No corre en push,
# pull_request, ni schedule. Eso es requisito del rubric OYD-D4
# Deliverable D ("gated destroy workflow"): destroy es una operación
# irreversible y debe requerir intervención humana explícita.
#
# Para correr: GitHub UI → Actions → "Terraform Destroy (gated)" →
# Run workflow → elegir environment → Run.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment a destruir"
        required: true
        type: choice
        options:
          - dev
          - staging
      confirm:
        description: "Tipear 'destroy' para confirmar (case-sensitive)"
        required: true
        type: string

permissions:
  contents: read
  # OIDC — D5 Deliverable C. Requerido para AssumeRoleWithWebIdentity.
  id-token: write

defaults:
  run:
    working-directory: infra

jobs:
  destroy:
    name: Destroy ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      # Checkout antes que los steps de validación/echo — el default
      # working-directory: infra requiere que el repo esté checked out
      # primero, sino bash falla con "No such file or directory" al
      # tratar de chdir a infra/.
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate confirm input
        if: inputs.confirm != 'destroy'
        run: |
          echo "::error::Confirmación faltante o inválida. Tipear 'destroy' (case-sensitive) en el input 'confirm'."
          exit 1

      - name: Echo target
        run: |
          echo "::notice::Destroying environment: ${{ inputs.environment }}"
          echo "Target tfvars: infra/envs/${{ inputs.environment }}/${{ inputs.environment }}.tfvars"
          echo "Target backend: infra/envs/${{ inputs.environment }}/backend-${{ inputs.environment }}.hcl"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.8"
          terraform_wrapper: false

      # OIDC — el environment se eligio via workflow_dispatch (inputs.environment),
      # y la propiedad `environment: ${{ inputs.environment }}` del job hace que
      # el sub claim del token JWT contenga environment:dev o environment:staging.
      # Ambos casos estan cubiertos por la trust policy del ci_runner. El ARN del
      # role lo elegimos por env via vars de GH (mismo role por ahora; cuando
      # separemos permisos por env se setean ARNs distintos).
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ inputs.environment == 'staging' && vars.AWS_ROLE_ARN_STAGING || vars.AWS_ROLE_ARN_DEV }}
          aws-region: us-east-1

      - name: Terraform init
        run: |
          terraform init \
            -backend-config=envs/${{ inputs.environment }}/backend-${{ inputs.environment }}.hcl \
            -input=false

      - name: Terraform destroy
        run: |
          terraform destroy \
            -var-file=envs/${{ inputs.environment }}/${{ inputs.environment }}.tfvars \
            -input=false \
            -auto-approve
